<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Student reviews & testimonials — Smart Computer Training Center, Kahla." />
  <title>Reviews — Smart Computer Training Center</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body data-page="testimonials">
<div id="nav-slot"></div>

<main>
  <section class="page-hero">
    <div class="container-x">
      <p class="eyebrow">Reviews · छात्रों की राय</p>
      <h1 class="h1 font-display" style="margin-top:0.75rem;max-width:48rem;">Real stories from <span style="color:#1e3a8a;">real students</span>.</h1>
      <div style="margin-top:1.25rem;display:flex;flex-wrap:wrap;align-items:center;gap:0.75rem;">
        <div style="display:inline-flex;align-items:center;gap:0.375rem;background:#fff;border-radius:9999px;padding:0.5rem 0.875rem;border:1px solid #fed7aa;">
          <i data-lucide="star" width="16" height="16" style="fill:#f97316;color:#f97316;"></i>
          <i data-lucide="star" width="16" height="16" style="fill:#f97316;color:#f97316;"></i>
          <i data-lucide="star" width="16" height="16" style="fill:#f97316;color:#f97316;"></i>
          <i data-lucide="star" width="16" height="16" style="fill:#f97316;color:#f97316;"></i>
          <i data-lucide="star" width="16" height="16" style="fill:#f97316;color:#f97316;"></i>
          <span style="margin-left:0.25rem;font-weight:600;color:#1e293b;">4.6 / 5</span>
        </div>
        <span style="font-size:0.875rem;color:#475569;">based on Google reviews</span>
      </div>
    </div>
  </section>

  <section style="padding:4rem 0 5rem;">
    <div class="container-x">
      <div id="reviews-grid" style="display:grid;grid-template-columns:1fr;gap:1.5rem;"></div>
    </div>
    <style>@media (min-width:768px){#reviews-grid{grid-template-columns:1fr 1fr !important;}}@media (min-width:1024px){#reviews-grid{grid-template-columns:repeat(3,1fr) !important;}}</style>
  </section>
</main>

<div id="footer-slot"></div>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const stars = (n) => Array.from({length:5}).map((_,i) => `<i data-lucide="star" width="16" height="16" style="${i<n?'fill:#f97316;color:#f97316;':'color:#e2e8f0;'}"></i>`).join("");
    document.getElementById("reviews-grid").innerHTML = TESTIMONIALS.map((t) => `
      <article class="card card-hover" style="position:relative;padding:1.75rem;">
        <i data-lucide="quote" width="48" height="48" style="position:absolute;top:1.25rem;right:1.25rem;color:#ffedd5;"></i>
        <div style="display:flex;gap:2px;margin-bottom:1rem;position:relative;">${stars(t.rating)}</div>
        <p style="color:#334155;line-height:1.6;margin:0;position:relative;">"${t.text}"</p>
        <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:0.75rem;">
          <div style="height:40px;width:40px;border-radius:9999px;background:#dbeafe;color:#1e3a8a;font-weight:700;display:inline-flex;align-items:center;justify-content:center;">${t.name[0]}</div>
          <div>
            <p style="font-weight:600;color:#0f172a;font-size:0.875rem;margin:0;">${t.name} <span style="color:#94a3b8;font-size:0.75rem;">· ${t.nameHi}</span></p>
            <p style="font-size:0.75rem;color:#64748b;margin:0;">${t.course} · Student</p>
          </div>
        </div>
      </article>
    `).join("");
    if (window.lucide) lucide.createIcons();
  });
</script>
</body>
</html>
