<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Computer services at Smart Computer Training Center — repair, software install, printer setup, online form filling, digital services." />
  <title>Services — Smart Computer Training Center</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body data-page="services">
<div id="nav-slot"></div>

<main>
  <section class="page-hero">
    <div class="container-x">
      <p class="eyebrow">Services · सेवाएँ</p>
      <h1 class="h1 font-display" style="margin-top:0.75rem;max-width:48rem;">Beyond training — full <span style="color:#1e3a8a;">computer support</span>.</h1>
      <p style="margin-top:1.25rem;font-size:1.125rem;color:#475569;max-width:36rem;">From repair and software installs to government form filling, we are the one-stop computer shop for Kahla and nearby villages.</p>
    </div>
  </section>

  <section style="padding:4rem 0 6rem;">
    <div class="container-x">
      <div id="services-grid" style="display:grid;grid-template-columns:1fr;gap:1.25rem;"></div>

      <div style="margin-top:4rem;border-radius:1.5rem;background:#f8fafc;padding:2.5rem;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:1.5rem;align-items:center;justify-content:space-between;text-align:center;" class="services-cta">
        <div>
          <h2 class="font-display" style="font-size:1.5rem;font-weight:600;color:#0f172a;margin:0;">Need a service today?</h2>
          <p style="margin-top:0.5rem;color:#475569;">Drop a WhatsApp message — we'll respond within working hours.</p>
        </div>
        <a href="https://wa.me/919771907685?text=Hello!%20I%20need%20a%20service%20at%20Smart%20Computer%20Training%20Center." target="_blank" rel="noreferrer" class="btn btn-green btn-lg">
          <i data-lucide="message-circle" width="18" height="18"></i> WhatsApp Us
        </a>
      </div>
    </div>
    <style>
      @media (min-width:640px){#services-grid{grid-template-columns:1fr 1fr !important;}}
      @media (min-width:1024px){#services-grid{grid-template-columns:repeat(4,1fr) !important;} .services-cta{flex-direction:row !important;text-align:left !important;}}
    </style>
  </section>
</main>

<div id="footer-slot"></div>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("services-grid").innerHTML = SERVICES.map((s, i) => {
      const featured = i === 0 || i === 4;
      const cardStyle = featured
        ? "background:#1e3a8a;color:#fff;border:1px solid #1e3a8a;"
        : "background:#fff;border:1px solid #e2e8f0;";
      const iconStyle = featured ? "background:#f97316;color:#fff;" : "background:#eff6ff;color:#1e3a8a;";
      const titleColor = featured ? "color:#fff;" : "color:#0f172a;";
      const hiColor = featured ? "color:#fdba74;" : "color:#ea580c;";
      const descColor = featured ? "color:#bfdbfe;" : "color:#475569;";
      return `
        <div class="card-hover" style="position:relative;border-radius:1rem;padding:1.75rem;${cardStyle}transition:all 0.3s ease;">
          <div style="height:48px;width:48px;border-radius:0.75rem;${iconStyle}display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="${s.icon}" width="22" height="22"></i></div>
          <h3 class="font-display" style="margin:1.25rem 0 0;font-weight:600;font-size:1.125rem;${titleColor}">${s.title}</h3>
          <p style="font-size:0.75rem;font-weight:600;margin:0 0 0.5rem;${hiColor}">${s.titleHi}</p>
          <p style="font-size:0.875rem;line-height:1.6;margin:0;${descColor}">${s.desc}</p>
        </div>`;
    }).join("");
    if (window.lucide) lucide.createIcons();
  });
</script>
</body>
</html>
