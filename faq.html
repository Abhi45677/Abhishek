<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Frequently asked questions — Smart Computer Training Center, Kahla." />
  <title>FAQ — Smart Computer Training Center</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body data-page="faq">
<div id="nav-slot"></div>

<main>
  <section class="page-hero">
    <div class="container-x">
      <p class="eyebrow">FAQ · सामान्य प्रश्न</p>
      <h1 class="h1 font-display" style="margin-top:0.75rem;max-width:48rem;">Got a question? <span style="color:#1e3a8a;">We have answers.</span></h1>
    </div>
  </section>

  <section style="padding:4rem 0 5rem;">
    <div class="container-x" style="max-width:48rem;">
      <div id="faq-list" style="display:flex;flex-direction:column;gap:0.75rem;"></div>

      <div style="margin-top:3rem;border-radius:1rem;background:#0f172a;color:#fff;padding:1.75rem;display:flex;flex-direction:column;sm:flex-row;align-items:center;gap:1rem;justify-content:space-between;text-align:center;" class="faq-cta">
        <div>
          <p class="font-display" style="font-weight:600;font-size:1.125rem;margin:0;">Still have a question?</p>
          <p style="font-size:0.875rem;color:#94a3b8;margin:0.25rem 0 0;">Reach us on WhatsApp — we typically reply within a few minutes.</p>
        </div>
        <a href="https://wa.me/919771907685?text=Hello!%20I%20have%20a%20question%20about%20Smart%20Computer%20Training%20Center." target="_blank" rel="noreferrer" class="btn btn-green">
          <i data-lucide="message-circle" width="16" height="16"></i> Ask on WhatsApp
        </a>
      </div>
      <style>@media (min-width:640px){.faq-cta{flex-direction:row !important;text-align:left !important;}}</style>
    </div>
  </section>
</main>

<div id="footer-slot"></div>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("faq-list").innerHTML = FAQS.map((f) => `
      <div class="accordion-item">
        <button class="accordion-trigger">
          <span style="display:flex;align-items:flex-start;gap:0.75rem;">
            <i data-lucide="help-circle" width="18" height="18" style="color:#f97316;flex-shrink:0;margin-top:2px;"></i>
            <span>
              ${f.q}
              <span style="display:block;font-size:0.75rem;color:#64748b;font-weight:400;margin-top:2px;">${f.qHi}</span>
            </span>
          </span>
          <i data-lucide="chevron-down" width="18" height="18" class="chev"></i>
        </button>
        <div class="accordion-content"><p style="color:#475569;line-height:1.6;margin:0;">${f.a}</p></div>
      </div>
    `).join("");
    if (window.lucide) lucide.createIcons();
  });
</script>
</body>
</html>
