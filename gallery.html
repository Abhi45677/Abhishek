<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Gallery — Smart Computer Training Center classrooms, labs and events." />
  <title>Gallery — Smart Computer Training Center</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body data-page="gallery">
<div id="nav-slot"></div>

<main>
  <section class="page-hero">
    <div class="container-x">
      <p class="eyebrow">Gallery · गैलरी</p>
      <h1 class="h1 font-display" style="margin-top:0.75rem;max-width:48rem;">Moments from our <span style="color:#1e3a8a;">classrooms</span>.</h1>
      <p style="margin-top:1.25rem;font-size:1.125rem;color:#475569;max-width:36rem;">A glimpse into our lab, classes and student events.</p>
    </div>
  </section>

  <section style="padding:4rem 0 5rem;">
    <div class="container-x">
      <div id="gallery-grid" style="display:grid;grid-template-columns:1fr;gap:1rem;"></div>
    </div>
    <style>@media (min-width:640px){#gallery-grid{grid-template-columns:1fr 1fr !important;}}@media (min-width:1024px){#gallery-grid{grid-template-columns:repeat(3,1fr) !important;}}</style>
  </section>
</main>

<!-- Lightbox -->
<div id="lightbox" class="dialog-overlay">
  <div class="dialog-content" style="max-width:48rem;overflow:hidden;position:relative;">
    <img id="lightbox-img" alt="" style="width:100%;display:block;" />
    <button id="lightbox-close" style="position:absolute;top:0.75rem;right:0.75rem;height:36px;width:36px;border-radius:9999px;background:rgba(0,0,0,0.6);color:#fff;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="x" width="18" height="18"></i></button>
    <div style="padding:1rem;background:#fff;"><p id="lightbox-caption" style="font-size:0.875rem;color:#334155;margin:0;"></p></div>
  </div>
</div>

<div id="footer-slot"></div>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("gallery-grid").innerHTML = GALLERY.map((g, i) => `
      <button class="gallery-item" data-gallery-index="${i}" style="position:relative;overflow:hidden;border-radius:1rem;background:#f1f5f9;aspect-ratio:4/3;border:1px solid #e2e8f0;padding:0;cursor:pointer;">
        <img src="${g.url}" alt="${g.caption}" style="width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;" loading="lazy" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" />
        <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(30,58,138,0.8), transparent);opacity:0;transition:opacity 0.2s ease;display:flex;align-items:flex-end;padding:1rem;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
          <p style="color:#fff;font-weight:600;font-size:0.875rem;margin:0;text-align:left;">${g.caption}</p>
        </div>
      </button>
    `).join("");
    if (window.lucide) lucide.createIcons();
  });
</script>
</body>
</html>
